{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="auth-card mx-auto">
        <div class="text-center mb-4">
            <i class="bi bi-person-circle display-5"></i>
            <h2 class="fw-bold mt-2">Welcome back</h2>
            <p class="text-muted">Login to create and manage your writing.</p>
        </div>
        <form method="post">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input class="form-control form-control-lg" type="email" name="email" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input class="form-control form-control-lg" type="password" name="password" required>
            </div>
            <button class="btn btn-primary btn-lg w-100">Login</button>
        </form>
        <p class="text-center text-muted mt-4 mb-0">
            New user? <a href="{{ url_for('register') }}">Create an account</a>
        </p>
    </div>
</div>
{% endblock %}
