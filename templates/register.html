{% extends "base.html" %}
{% block title %}Create Account{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="auth-card mx-auto">
        <div class="text-center mb-4">
            <h2 class="fw-bold">Create your writing profile</h2>
            <p class="text-muted">Your active login details are used in the digital signature.</p>
        </div>
        <form method="post">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label">Full name</label>
                    <input class="form-control" name="name" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Email address</label>
                    <input class="form-control" type="email" name="email" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Designation</label>
                    <input class="form-control" name="designation" placeholder="Student, Analyst...">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Organization</label>
                    <input class="form-control" name="organization">
                </div>
                <div class="col-12">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" name="password" minlength="6" required>
                    <div class="form-text">Use at least six characters.</div>
                </div>
            </div>
            <button class="btn btn-primary btn-lg w-100 mt-4">Create Account</button>
        </form>
    </div>
</div>
{% endblock %}
